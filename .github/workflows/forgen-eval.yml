name: forgen-eval

on:
  pull_request:
    paths:
      - 'packages/forgen-eval/**'
      - 'docs/adr/ADR-004-*'
      - 'docs/adr/ADR-005-*'
      - 'docs/adr/ADR-006-*'
      - '.github/workflows/forgen-eval.yml'
  push:
    branches: [main]
    paths:
      - 'packages/forgen-eval/**'

jobs:
  unit:
    name: Type-check + unit tests (free tier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type-check forgen-eval
        run: npx tsc --noEmit -p tsconfig.json
        working-directory: packages/forgen-eval
      - name: Run forgen-eval unit tests
        run: npx vitest run --no-coverage
        working-directory: packages/forgen-eval

  dataset-version-check:
    name: Verify dataset pin resolves
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Read pinned commit
        id: pin
        run: |
          COMMIT=$(jq -r '.commit' packages/forgen-eval/datasets-version.json 2>/dev/null || \
                   curl -fsSL https://raw.githubusercontent.com/forgen-team/forgen-eval-data/main/datasets-version.json | jq -r '.commit')
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
      - name: Verify commit exists in forgen-eval-data
        run: |
          if [ "${{ steps.pin.outputs.commit }}" = "PLACEHOLDER_BOOTSTRAP" ]; then
            echo "::warning::dataset version is bootstrap placeholder — replace before v0.5.0 release"
            exit 0
          fi
          gh api repos/forgen-team/forgen-eval-data/commits/${{ steps.pin.outputs.commit }} > /dev/null
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

